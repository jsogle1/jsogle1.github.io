<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynastic Timeline Starter</title>
  <style>
    :root {
      --year-width: 8px;         /* pixels per year */
      --lane-height: 170px;      /* fixed height per house lane */
      --header-width: 150px;     /* width of left-side house labels */
      --ruler-height: 44px;
      --event-label-height: 22px;
      --bar-radius: 10px;
      --bar-padding: 10px;
      --bg: #f7f3ea;
      --ink: #2b241c;
      --muted: #6d6255;
      --grid: #d7cebf;
      --card: #fffdf8;
      --accent: #8b5e3c;
      --accent-soft: #dbc4a6;
      --event: #7f1d1d;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
      --font: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      padding: 18px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
      margin-bottom: 16px;
      padding: 14px;
      background: var(--card);
      border: 1px solid var(--grid);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.35rem;
      margin-right: 10px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      font-size: 0.95rem;
      color: var(--muted);
    }

    input[type="range"] {
      width: 180px;
    }

    .toggle-wrap {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .timeline-shell {
      background: var(--card);
      border: 1px solid var(--grid);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .timeline-scroll {
      overflow: auto;
      position: relative;
      max-height: 80vh;
    }

    .timeline {
      position: relative;
      min-height: 400px;
    }

    .ruler-left-corner,
    .lane-label,
    .details-panel {
      background: #f3ede2;
    }

    .ruler-left-corner {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 7;
      width: var(--header-width);
      height: var(--ruler-height);
      border-right: 1px solid var(--grid);
      border-bottom: 1px solid var(--grid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .year-ruler {
      position: sticky;
      top: 0;
      z-index: 6;
      left: var(--header-width);
      height: var(--ruler-height);
      background: linear-gradient(to bottom, #fbf8f1, #f1e9dc);
      border-bottom: 1px solid var(--grid);
    }

    .year-mark {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px solid var(--grid);
      font-size: 0.8rem;
      color: var(--muted);
      padding-left: 4px;
      display: flex;
      align-items: flex-end;
      padding-bottom: 5px;
      white-space: nowrap;
    }

    .timeline-body {
      position: relative;
    }

    .lane-row {
      position: absolute;
      left: 0;
      right: 0;
      height: var(--lane-height);
      border-bottom: 1px solid var(--grid);
    }

    .lane-label {
      position: sticky;
      left: 0;
      z-index: 5;
      width: var(--header-width);
      height: 100%;
      border-right: 1px solid var(--grid);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px;
    }

    .lane-label strong {
      font-size: 1.05rem;
    }

    .lane-label span {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .lane-grid {
      position: absolute;
      left: var(--header-width);
      right: 0;
      top: 0;
      bottom: 0;
    }

    .grid-year-line {
      position: absolute;
      top: 0;
      bottom: 0;
      border-left: 1px dotted rgba(0,0,0,0.12);
      pointer-events: none;
    }

    .holding-bar {
      position: absolute;
      z-index: 2;
      background: linear-gradient(180deg, #fbf0de 0%, #ecd4ad 100%);
      border: 1px solid #b1884d;
      border-radius: var(--bar-radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 110px;
    }

    .holding-bar[data-houses-count="2"] {
      background: linear-gradient(180deg, #f9edd6 0%, #e5c89a 100%);
      border-color: #9e6a28;
    }

    .holding-bar[data-houses-count="3"] {
      background: linear-gradient(180deg, #f5e2bc 0%, #dcb16d 100%);
      border-color: #7f4f12;
    }

    .holding-header {
      padding: 8px 10px 6px;
      border-bottom: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.25);
      font-size: 0.93rem;
      line-height: 1.2;
    }

    .holding-header strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .holding-meta {
      font-size: 0.82rem;
      color: #4b3c28;
    }

    .holding-content {
      padding: var(--bar-padding);
      overflow-y: auto;
      font-size: 0.86rem;
      line-height: 1.28;
      height: calc(100% - 54px);
    }

    .holding-content p {
      margin: 0 0 8px;
    }

    .holding-content p:last-child {
      margin-bottom: 0;
    }

    .holding-bar:hover {
      filter: brightness(1.02);
      cursor: pointer;
    }

    .event-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 2px solid rgba(127,29,29,0.72);
      z-index: 1;
      pointer-events: none;
    }

    .event-label {
      position: absolute;
      top: 2px;
      transform: translateX(4px);
      font-size: 0.78rem;
      color: var(--event);
      background: rgba(255,255,255,0.9);
      padding: 1px 4px;
      border-radius: 4px;
      border: 1px solid rgba(127,29,29,0.25);
      white-space: nowrap;
    }

    .details-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: min(420px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      border: 1px solid var(--grid);
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      padding: 16px;
      z-index: 30;
      display: none;
    }

    .details-panel.open {
      display: block;
    }

    .details-panel h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.25rem;
    }

    .details-panel .meta {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .details-panel .close-btn {
      float: right;
      border: 1px solid var(--grid);
      background: white;
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      font-family: inherit;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .legend .sample {
      width: 22px;
      height: 12px;
      border-radius: 4px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 5px;
      border: 1px solid #9e6a28;
      background: linear-gradient(180deg, #fbf0de 0%, #ecd4ad 100%);
    }

    .legend .merged2 { background: linear-gradient(180deg, #f9edd6 0%, #e5c89a 100%); }
    .legend .merged3 { background: linear-gradient(180deg, #f5e2bc 0%, #dcb16d 100%); }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 800px) {
      :root {
        --header-width: 118px;
        --lane-height: 190px;
      }
      .topbar {
        padding: 12px;
      }
      .toggle-wrap {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Dynastic House Timeline</h1>

      <div class="controls">
        <div class="control-group">
          <label for="scaleSlider">Year scale</label>
          <input id="scaleSlider" type="range" min="4" max="20" value="8" step="1" />
          <span id="scaleValue">8 px/year</span>
        </div>

        <div class="control-group">
          <label for="startYearInput">Start</label>
          <input id="startYearInput" type="number" value="1066" style="width:80px;" />
        </div>

        <div class="control-group">
          <label for="endYearInput">End</label>
          <input id="endYearInput" type="number" value="1410" style="width:80px;" />
        </div>
      </div>

      <div class="toggle-wrap">
        <label><input type="checkbox" id="toggleEvents" checked /> Show events</label>
        <label><input type="checkbox" id="toggleGrid" checked /> Show grid</label>
      </div>
    </div>

    <div class="legend">
      <span><span class="sample"></span> single house</span>
      <span><span class="sample merged2"></span> merged across 2 houses</span>
      <span><span class="sample merged3"></span> merged across 3 houses</span>
    </div>

    <div class="hint">
      Click any holding block to inspect details. Add houses by appending to the <code>houses</code> array. Add merged segments by increasing <code>laneSpan</code> and listing multiple house ids in <code>houseIds</code>.
    </div>

    <div class="timeline-shell" style="margin-top: 12px;">
      <div class="timeline-scroll">
        <div id="timeline" class="timeline"></div>
      </div>
    </div>
  </div>

  <aside id="detailsPanel" class="details-panel" aria-live="polite">
    <button class="close-btn" id="closePanel">Close</button>
    <div id="detailsContent"></div>
  </aside>

  <script>
    /**
     * STARTER DATA MODEL
     * ------------------
     * Houses are timeline lanes.
     * Segments now support two modes:
     *  - type: "holding"  => head/control bar
     *  - type: "person"   => thinner concurrent family-member bar within the lane
     *
     * laneStart is the zero-based house index.
     * laneSpan allows merged control across adjacent houses.
     * sublane is only used for person bars inside a house lane.
     */

    const houses = [
      { id: "mitford", label: "Mitford", subtitle: "Barony / senior Bertram line" },
      { id: "bothal", label: "Bothal", subtitle: "Bertram cadet / later principal line" },
      { id: "ogle", label: "Ogle", subtitle: "Parallel neighboring house" },
    ];

    const events = [
      { year: 1066, label: "Hastings" },
      { year: 1070, label: "Harrying" },
      { year: 1138, label: "Standard" },
      { year: 1215, label: "Magna Carta" },
      { year: 1264, label: "Lewes" },
      { year: 1265, label: "Evesham" },
      { year: 1298, label: "Falkirk" },
      { year: 1314, label: "Bannockburn" },
      { year: 1346, label: "Neville's Cross" },
    ];

    const segments = [
      {
        id: "mitford-bertram-01",
        type: "holding",
        label: "Bertram line at Mitford",
        holder: "Richard / early Bertram successors",
        spouse: "Sybil Mitford (traditionally)",
        startYear: 1066,
        endYear: 1152,
        laneStart: 0,
        laneSpan: 1,
        houseIds: ["mitford"],
        summary: "Senior Bertram line associated with Mitford after the Conquest.",
        notes: "Use this broad holding segment while the chronology is still being refined. Later you can split it into smaller reign/holding bars.",
        source: "Starter placeholder"
      },
      {
        id: "mitford-bertram-son-01",
        type: "person",
        label: "Younger Bertram son",
        holder: "Non-holding family member",
        spouse: "—",
        startYear: 1118,
        endYear: 1148,
        laneStart: 0,
        laneSpan: 1,
        sublane: 1,
        houseIds: ["mitford"],
        summary: "Example of a son alive during the father's lifetime who never inherits.",
        notes: "This is the new behavior. Use type: 'person' for sons, daughters, widows, brothers, heirs apparent, or other important simultaneous figures who do not themselves control the house.",
        source: "Starter example"
      },
      {
        id: "bothal-bertram-01",
        type: "holding",
        label: "Bothal branch emerges",
        holder: "Richard Bertram I",
        spouse: "Menebell? / uncertain",
        startYear: 1161,
        endYear: 1211,
        laneStart: 1,
        laneSpan: 1,
        houseIds: ["bothal"],
        summary: "Cadet Bertram line at Bothal, later crucial to consolidation.",
        notes: "Main holding/control bar for the line at Bothal.",
        source: "Bothal material"
      },
      {
        id: "bothal-heir-01",
        type: "person",
        label: "Robert Bertram (heir in youth)",
        holder: "Concurrent heir",
        spouse: "—",
        startYear: 1176,
        endYear: 1212,
        laneStart: 1,
        laneSpan: 1,
        sublane: 0,
        houseIds: ["bothal"],
        summary: "Example concurrent person bar inside the same house lane.",
        notes: "Use person bars when someone is alive, relevant, and visible in the story, but is not the principal holder for all or part of that span.",
        source: "Starter example"
      },
      {
        id: "ogle-line-01",
        type: "holding",
        label: "Early Ogle line",
        holder: "Wulfric / Hunfrid / Gilbert sequence",
        spouse: "various",
        startYear: 1066,
        endYear: 1250,
        laneStart: 2,
        laneSpan: 1,
        houseIds: ["ogle"],
        summary: "Parallel Ogle continuity through the same centuries.",
        notes: "This can be split later into discrete Ogle holders once chronology stabilizes.",
        source: "Ogle material"
      },
      {
        id: "mitford-bothal-merge-01",
        type: "holding",
        label: "Bothal branch also holds Mitford",
        holder: "Later Bertram consolidation",
        spouse: "context-dependent",
        startYear: 1301,
        endYear: 1403,
        laneStart: 0,
        laneSpan: 2,
        houseIds: ["mitford", "bothal"],
        summary: "Merged control bar spanning Mitford and Bothal.",
        notes: "Single merged bar for one line controlling both houses. When control separates again, replace it with individual holding bars in separate lanes.",
        source: "Working interpretation"
      },
      {
        id: "merge-heiress-01",
        type: "person",
        label: "Helen Bertram",
        holder: "Heiress / transmission figure",
        spouse: "Robert de Ogle / later husbands",
        startYear: 1338,
        endYear: 1403,
        laneStart: 1,
        laneSpan: 1,
        sublane: 1,
        houseIds: ["bothal"],
        summary: "Important non-holding person who transmits control and links houses.",
        notes: "This is exactly the kind of figure that disappears in a holder-only system. Person bars keep such people visible without pretending they are sole heads of house the whole time.",
        source: "Starter example"
      },
      {
        id: "ogle-line-02",
        type: "holding",
        label: "High medieval Ogle line",
        holder: "John / Robert / later Ogles",
        spouse: "various",
        startYear: 1250,
        endYear: 1410,
        laneStart: 2,
        laneSpan: 1,
        houseIds: ["ogle"],
        summary: "Later Ogle continuity parallel to Bertram developments.",
        notes: "If Ogle and Mitford ever overlap in control, create another merged holding bar with laneSpan set appropriately.",
        source: "Ogle material"
      },
      {
        id: "ogle-son-02",
        type: "person",
        label: "Ogle son who dies before inheritance",
        holder: "Heir apparent",
        spouse: "—",
        startYear: 1285,
        endYear: 1300,
        laneStart: 2,
        laneSpan: 1,
        sublane: 0,
        houseIds: ["ogle"],
        summary: "Example of father and son visible at the same time in one house lane.",
        notes: "Use sublanes to show simultaneous family members. The father can still be the holding bar while the son appears as a narrower person bar beneath or above it.",
        source: "Starter example"
      },
    ];

    const timelineEl = document.getElementById('timeline');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleValue = document.getElementById('scaleValue');
    const startYearInput = document.getElementById('startYearInput');
    const endYearInput = document.getElementById('endYearInput');
    const toggleEvents = document.getElementById('toggleEvents');
    const toggleGrid = document.getElementById('toggleGrid');
    const detailsPanel = document.getElementById('detailsPanel');
    const detailsContent = document.getElementById('detailsContent');
    const closePanel = document.getElementById('closePanel');

    function pxPerYear() {
      return parseInt(scaleSlider.value, 10);
    }

    function startYear() {
      return parseInt(startYearInput.value, 10);
    }

    function endYear() {
      return parseInt(endYearInput.value, 10);
    }

    function yearToLeft(year) {
      return (year - startYear()) * pxPerYear();
    }

    function getTimelineWidth() {
      return (endYear() - startYear() + 1) * pxPerYear() + parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-width'));
    }

    function getHoldingHeight(laneSpan, laneHeight) {
      return (laneSpan * laneHeight) - 16;
    }

    function getPersonBarMetrics(seg, laneHeight) {
      const sublane = Number.isInteger(seg.sublane) ? seg.sublane : 0;
      const topBase = seg.laneStart * laneHeight;
      const barHeight = 34;
      const spacing = 8;
      const top = topBase + 10 + (sublane * (barHeight + spacing));
      return { top, height: barHeight };
    }

    function renderTimeline() {
      const headerWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-width'));
      const laneHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--lane-height'));
      const rulerHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ruler-height'));
      const bodyHeight = houses.length * laneHeight;
      const totalWidth = getTimelineWidth();

      timelineEl.innerHTML = '';
      timelineEl.style.width = `${totalWidth}px`;
      timelineEl.style.height = `${rulerHeight + bodyHeight}px`;

      const corner = document.createElement('div');
      corner.className = 'ruler-left-corner';
      corner.textContent = 'Houses';
      timelineEl.appendChild(corner);

      const ruler = document.createElement('div');
      ruler.className = 'year-ruler';
      ruler.style.position = 'absolute';
      ruler.style.left = `${headerWidth}px`;
      ruler.style.width = `${totalWidth - headerWidth}px`;
      timelineEl.appendChild(ruler);

      for (let y = startYear(); y <= endYear(); y += 10) {
        const mark = document.createElement('div');
        mark.className = 'year-mark';
        mark.style.left = `${yearToLeft(y)}px`;
        mark.textContent = y;
        ruler.appendChild(mark);
      }

      const body = document.createElement('div');
      body.className = 'timeline-body';
      body.style.position = 'absolute';
      body.style.top = `${rulerHeight}px`;
      body.style.left = '0';
      body.style.width = `${totalWidth}px`;
      body.style.height = `${bodyHeight}px`;
      timelineEl.appendChild(body);

      houses.forEach((house, idx) => {
        const row = document.createElement('div');
        row.className = 'lane-row';
        row.style.top = `${idx * laneHeight}px`;
        row.style.height = `${laneHeight}px`;
        body.appendChild(row);

        const label = document.createElement('div');
        label.className = 'lane-label';
        label.innerHTML = `<strong>${house.label}</strong><span>${house.subtitle || ''}</span>`;
        row.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'lane-grid';
        row.appendChild(grid);

        if (toggleGrid.checked) {
          for (let y = startYear(); y <= endYear(); y++) {
            const line = document.createElement('div');
            line.className = 'grid-year-line';
            line.style.left = `${yearToLeft(y)}px`;
            if (y % 10 === 0) line.style.borderLeftStyle = 'solid';
            grid.appendChild(line);
          }
        }
      });

      if (toggleEvents.checked) {
        events.forEach(ev => {
          if (ev.year < startYear() || ev.year > endYear()) return;
          const line = document.createElement('div');
          line.className = 'event-line';
          line.style.left = `${headerWidth + yearToLeft(ev.year)}px`;
          line.style.top = `${rulerHeight}px`;
          line.style.height = `${bodyHeight}px`;
          timelineEl.appendChild(line);

          const label = document.createElement('div');
          label.className = 'event-label';
          label.style.left = `${headerWidth + yearToLeft(ev.year)}px`;
          label.textContent = `${ev.year} ${ev.label}`;
          timelineEl.appendChild(label);
        });
      }

      segments.forEach(seg => {
        if (seg.endYear < startYear() || seg.startYear > endYear()) return;

        const visibleStart = Math.max(seg.startYear, startYear());
        const visibleEnd = Math.min(seg.endYear, endYear());
        const housesCount = seg.houseIds?.length || seg.laneSpan || 1;
        const width = Math.max((visibleEnd - visibleStart + 1) * pxPerYear(), seg.type === 'person' ? 70 : 110);

        const bar = document.createElement('div');
        bar.className = 'holding-bar';
        bar.dataset.housesCount = String(housesCount);
        bar.dataset.segmentType = seg.type || 'holding';
        bar.style.left = `${headerWidth + yearToLeft(visibleStart)}px`;
        bar.style.width = `${width}px`;

        if (seg.type === 'person') {
          const metrics = getPersonBarMetrics(seg, laneHeight);
          bar.classList.add('person-bar');
          bar.style.top = `${rulerHeight + metrics.top}px`;
          bar.style.height = `${metrics.height}px`;
          bar.innerHTML = `
            <div class="holding-header" style="padding:6px 8px;border-bottom:none;">
              <strong style="font-size:0.88rem; margin-bottom:0;">${seg.label}</strong>
              <div class="holding-meta">${seg.startYear}–${seg.endYear}</div>
            </div>
          `;
        } else {
          bar.style.top = `${rulerHeight + (seg.laneStart * laneHeight) + 8}px`;
          bar.style.height = `${getHoldingHeight(seg.laneSpan, laneHeight)}px`;

          const datesText = `${seg.startYear}–${seg.endYear}`;
          const houseText = Array.isArray(seg.houseIds) ? seg.houseIds.join(' + ') : '';
          bar.innerHTML = `
            <div class="holding-header">
              <strong>${seg.label}</strong>
              <div class="holding-meta">${datesText} · ${houseText}</div>
            </div>
            <div class="holding-content">
              <p><strong>Holder:</strong> ${seg.holder || '—'}</p>
              <p><strong>Spouse:</strong> ${seg.spouse || '—'}</p>
              <p><strong>Summary:</strong> ${seg.summary || ''}</p>
              <p>${seg.notes || ''}</p>
            </div>
          `;
        }

        bar.addEventListener('click', () => openDetails(seg));
        timelineEl.appendChild(bar);
      });
    }

    function openDetails(seg) {
      const houseText = (seg.houseIds || []).join(' + ');
      detailsContent.innerHTML = `
        <h2>${seg.label}</h2>
        <div class="meta">${seg.startYear}–${seg.endYear} · ${houseText}</div>
        <p><strong>Type:</strong> ${seg.type || 'holding'}</p>
        <p><strong>Holder / role:</strong> ${seg.holder || '—'}</p>
        <p><strong>Spouse:</strong> ${seg.spouse || '—'}</p>
        <p><strong>Lane start:</strong> ${seg.laneStart} | <strong>Lane span:</strong> ${seg.laneSpan}</p>
        <p><strong>Sublane:</strong> ${Number.isInteger(seg.sublane) ? seg.sublane : '—'}</p>
        <p><strong>Summary:</strong> ${seg.summary || '—'}</p>
        <p><strong>Notes:</strong><br>${seg.notes || '—'}</p>
        <p><strong>Source:</strong> ${seg.source || '—'}</p>
        <hr>
        <p><strong>Editing hint:</strong> Use <code>type: 'holding'</code> for control bars and <code>type: 'person'</code> for concurrent family members. Person bars stay inside a single house lane and can stack using <code>sublane</code>. Holding bars can merge houses using <code>laneSpan</code>.</p>
      `;
      detailsPanel.classList.add('open');
    }

    function updateScaleLabel() {
      scaleValue.textContent = `${pxPerYear()} px/year`;
      document.documentElement.style.setProperty('--year-width', `${pxPerYear()}px`);
    }

    [scaleSlider, startYearInput, endYearInput, toggleEvents, toggleGrid].forEach(el => {
      el.addEventListener('input', () => {
        updateScaleLabel();
        renderTimeline();
      });
      el.addEventListener('change', () => {
        updateScaleLabel();
        renderTimeline();
      });
    });

    closePanel.addEventListener('click', () => detailsPanel.classList.remove('open'));
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') detailsPanel.classList.remove('open');
    });

    updateScaleLabel();
    renderTimeline();
  </script>
</body>
</html>
